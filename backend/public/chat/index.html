<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PawCoach – Dein KI-Hundetrainer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #212121;
      color: #ececec;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Top Bar */
    .topbar {
      height: 56px;
      background: #2f2f2f;
      border-bottom: 1px solid #3f3f3f;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      flex-shrink: 0;
    }
    .topbar-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: #3f3f3f; display: flex; align-items: center;
      justify-content: center; font-size: 20px;
    }
    .topbar-info .topbar-name { font-size: 16px; font-weight: 700; color: #fff; }
    .topbar-info .topbar-sub { font-size: 12px; color: #8e8ea0; }
    .topbar-status {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: #10a37f;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #10a37f; }

    /* Chat Area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      scroll-behavior: smooth;
    }

    .welcome-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      text-align: center;
      padding: 32px;
    }
    .welcome-avatar { font-size: 64px; }
    .welcome-title { font-size: 24px; font-weight: 700; }
    .welcome-name { font-size: 16px; color: #10a37f; font-weight: 600; }
    .welcome-sub { color: #8e8ea0; font-size: 14px; max-width: 400px; line-height: 1.6; }
    .suggestion-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-width: 480px;
      width: 100%;
      margin-top: 8px;
    }
    .suggestion-btn {
      background: #2f2f2f;
      border: 1px solid #3f3f3f;
      border-radius: 10px;
      padding: 12px 14px;
      color: #ececec;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      line-height: 1.4;
    }
    .suggestion-btn:hover { background: #3f3f3f; border-color: #10a37f; }

    /* Messages */
    .message-wrapper {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .message {
      display: flex;
      gap: 14px;
      padding: 16px 0;
      border-bottom: 1px solid #2a2a2a;
    }
    .message:last-child { border-bottom: none; }
    .message-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0; margin-top: 2px;
    }
    .message.user .message-avatar { background: #10a37f; color: #fff; font-size: 13px; font-weight: 700; }
    .message.assistant .message-avatar { background: #2f2f2f; border: 1px solid #3f3f3f; }
    .message-body { flex: 1; min-width: 0; }
    .message-name { font-size: 12px; font-weight: 600; color: #8e8ea0; margin-bottom: 6px; }
    .message-content { font-size: 15px; line-height: 1.75; color: #d1d5db; white-space: pre-wrap; word-wrap: break-word; }
    .message.user .message-content { color: #ececec; }

    /* Typing indicator */
    .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .typing-indicator span {
      width: 7px; height: 7px; background: #8e8ea0;
      border-radius: 50%; animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

    /* Input Area */
    .input-area { background: #212121; padding: 16px 24px 20px; flex-shrink: 0; }
    .input-wrapper {
      max-width: 760px; margin: 0 auto;
      background: #2f2f2f; border: 1px solid #3f3f3f; border-radius: 14px;
      display: flex; align-items: flex-end; gap: 8px; padding: 10px 12px 10px 16px;
      transition: border-color 0.2s;
    }
    .input-wrapper:focus-within { border-color: #10a37f; }
    textarea#msgInput {
      flex: 1; background: transparent; border: none; outline: none;
      color: #ececec; font-size: 15px; font-family: inherit;
      resize: none; max-height: 160px; min-height: 24px; line-height: 1.6;
    }
    textarea#msgInput::placeholder { color: #6e6e80; }
    .send-btn {
      width: 36px; height: 36px; background: #10a37f; border: none; border-radius: 8px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
    }
    .send-btn:disabled { background: #3f3f3f; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; fill: #fff; }
    .input-hint { text-align: center; font-size: 11px; color: #6e6e80; margin-top: 8px; }

    /* Rating row */
    .rating-row {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-top: 8px;
      padding-left: 0;
    }
    .rating-row .star-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: #6e6e80;
      padding: 2px;
      transition: color 0.15s, transform 0.15s;
      line-height: 1;
    }
    .rating-row .star-btn:hover,
    .rating-row .star-btn.hovered {
      color: #f5c542;
      transform: scale(1.15);
    }
    .rating-row .star-btn.filled {
      color: #f5c542;
    }
    .rating-thanks {
      font-size: 13px;
      color: #8e8ea0;
      margin-top: 8px;
    }

    /* New Chat button */
    .new-chat-btn {
      margin-left: auto;
      background: none;
      border: 1px solid #3f3f3f;
      border-radius: 8px;
      color: #8e8ea0;
      font-size: 12px;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .new-chat-btn:hover {
      border-color: #10a37f;
      color: #10a37f;
    }

    /* Scrollbar */
    .chat-area::-webkit-scrollbar { width: 6px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: #3f3f3f; border-radius: 3px; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-avatar" id="topbarAvatar">🐕</div>
  <div class="topbar-info">
    <div class="topbar-name" id="topbarName">PawCoach</div>
    <div class="topbar-sub" id="topbarSub">KI-Hundetrainer</div>
  </div>
  <button class="new-chat-btn" id="newChatBtn" onclick="startNewChat()" title="Neuer Chat">Neuer Chat</button>
  <div class="topbar-status">
    <div class="status-dot"></div>
    Online
  </div>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome-screen" id="welcomeScreen">
    <div class="welcome-avatar" id="welcomeAvatar">🐕</div>
    <div class="welcome-name" id="welcomeName">Lade…</div>
    <div class="welcome-title">Wie kann ich dir helfen?</div>
    <div class="welcome-sub" id="welcomeSub">Stell mir deine Frage zur Hundeerziehung!</div>
    <div class="suggestion-grid" id="suggestionGrid">
      <button class="suggestion-btn" onclick="suggest(this)">Mein Hund zieht stark an der Leine. Was tun?</button>
      <button class="suggestion-btn" onclick="suggest(this)">Wie trainiere ich meinen Welpen mit Clicker?</button>
      <button class="suggestion-btn" onclick="suggest(this)">Mein Hund bellt ständig fremde Menschen an.</button>
      <button class="suggestion-btn" onclick="suggest(this)">Wie oft sollte ich meinen Hund täglich trainieren?</button>
    </div>
  </div>
  <div class="message-wrapper" id="messageList" style="display:none"></div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea id="msgInput" placeholder="Stell deine Frage…" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" disabled onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  const STORAGE_KEY = 'pawcoach_chat';
  const MAX_MESSAGES = 40; // 20 exchanges

  let trainer = null;
  let history = [];
  let messages = []; // {role, content, chatId?}
  let isLoading = false;

  // --- localStorage helpers ---
  function saveToStorage() {
    const data = { messages: messages.slice(-MAX_MESSAGES), history: history.slice(-MAX_MESSAGES) };
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
  }
  function loadFromStorage() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch { return null; }
  }
  function clearStorage() {
    try { localStorage.removeItem(STORAGE_KEY); } catch {}
  }

  // --- Restore chat history on load ---
  function restoreChat() {
    const saved = loadFromStorage();
    if (!saved || !saved.messages || saved.messages.length === 0) return;
    messages = saved.messages;
    history = saved.history || [];
    document.getElementById('welcomeScreen').style.display = 'none';
    document.getElementById('messageList').style.display = 'block';
    const list = document.getElementById('messageList');
    list.innerHTML = '';
    for (const msg of messages) {
      const contentEl = appendMessage(msg.role, '', true);
      contentEl.textContent = msg.content;
      // Show rated state if already rated
      if (msg.role === 'assistant' && msg.rated) {
        const msgBody = contentEl.closest('.message-body');
        showRatingThanks(msgBody, msg.rated);
      }
      // Show unrated rating row for assistant messages with chatId that were not rated
      if (msg.role === 'assistant' && msg.chatId && !msg.rated) {
        const msgBody = contentEl.closest('.message-body');
        addRatingRow(msgBody, msg.chatId);
      }
    }
    scrollDown();
  }

  // --- New Chat ---
  function startNewChat() {
    clearStorage();
    messages = [];
    history = [];
    document.getElementById('messageList').innerHTML = '';
    document.getElementById('messageList').style.display = 'none';
    document.getElementById('welcomeScreen').style.display = 'flex';
  }

  // --- Rating ---
  function addRatingRow(msgBody, chatId) {
    const row = document.createElement('div');
    row.className = 'rating-row';
    for (let i = 1; i <= 5; i++) {
      const btn = document.createElement('button');
      btn.className = 'star-btn';
      btn.textContent = '\u2606'; // ☆
      btn.dataset.value = i;
      btn.addEventListener('mouseenter', () => {
        row.querySelectorAll('.star-btn').forEach(s => {
          s.classList.toggle('hovered', parseInt(s.dataset.value) <= i);
        });
      });
      btn.addEventListener('mouseleave', () => {
        row.querySelectorAll('.star-btn').forEach(s => s.classList.remove('hovered'));
      });
      btn.addEventListener('click', () => submitRating(chatId, i, row, msgBody));
      row.appendChild(btn);
    }
    msgBody.appendChild(row);
  }

  function submitRating(chatId, rating, row, msgBody) {
    // Immediately show thanks
    row.remove();
    showRatingThanks(msgBody, rating);
    // Update stored message
    const msg = messages.find(m => m.chatId === chatId);
    if (msg) { msg.rated = rating; saveToStorage(); }
    // Send to backend
    fetch('/api/rate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chatId, rating }),
    }).catch(() => {}); // silent fail
  }

  function showRatingThanks(msgBody, rating) {
    const thanks = document.createElement('div');
    thanks.className = 'rating-thanks';
    thanks.textContent = 'Danke f\u00fcr dein Feedback! ' + '\u2605'.repeat(rating) + '\u2606'.repeat(5 - rating);
    msgBody.appendChild(thanks);
  }

  // Trainer-Info laden
  fetch('/api/trainer')
    .then(r => r.json())
    .then(t => {
      trainer = t;
      document.getElementById('topbarAvatar').textContent = t.avatar || '🐕';
      document.getElementById('topbarName').textContent = t.name;
      document.getElementById('topbarSub').textContent = t.specialty;
      document.getElementById('welcomeAvatar').textContent = t.avatar || '🐕';
      document.getElementById('welcomeName').textContent = t.name;
      document.getElementById('welcomeSub').textContent =
        `Hallo! Ich bin ${t.name}. Stell mir deine Fragen rund um Hundeerziehung!`;
      // Restore chat after trainer info is loaded (so avatars render correctly)
      restoreChat();
    })
    .catch(() => {
      // Still restore even if trainer fetch fails
      restoreChat();
    });

  function suggest(btn) {
    document.getElementById('msgInput').value = btn.textContent;
    autoResize();
    sendMessage();
  }

  const textarea = document.getElementById('msgInput');
  function autoResize() {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 160) + 'px';
    document.getElementById('sendBtn').disabled = !textarea.value.trim() || isLoading;
  }
  textarea.addEventListener('input', autoResize);
  textarea.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function appendMessage(role, content, isRestore) {
    const list = document.getElementById('messageList');
    if (!isRestore) {
      document.getElementById('welcomeScreen').style.display = 'none';
      list.style.display = 'block';
    }

    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `
      <div class="message-avatar">${role === 'user' ? 'Du' : (trainer?.avatar || '🐕')}</div>
      <div class="message-body">
        <div class="message-name">${role === 'user' ? 'Du' : (trainer?.name || 'Trainer')}</div>
        <div class="message-content"></div>
      </div>`;
    list.appendChild(div);
    if (!isRestore) scrollDown();
    return div.querySelector('.message-content');
  }

  function scrollDown() {
    const area = document.getElementById('chatArea');
    setTimeout(() => area.scrollTo({ top: area.scrollHeight, behavior: 'smooth' }), 50);
  }

  async function sendMessage() {
    const text = textarea.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    textarea.value = '';
    textarea.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;

    appendMessage('user', text);
    messages.push({ role: 'user', content: text });
    history.push({ role: 'user', content: text });

    const contentEl = appendMessage('assistant', '');
    contentEl.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

    let fullText = '';
    let chatId = null;
    let firstChunk = true;

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: history.slice(-10) }),
      });

      const reader = response.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const lines = decoder.decode(value).split('\n');
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6);
          if (data === '[DONE]') break;
          try {
            const parsed = JSON.parse(data);
            // Capture chatId from the stream
            if (parsed.chatId) {
              chatId = parsed.chatId;
            }
            if (parsed.text) {
              if (firstChunk) { contentEl.textContent = ''; firstChunk = false; }
              fullText += parsed.text;
              contentEl.textContent = fullText;
              scrollDown();
            }
          } catch {}
        }
      }
    } catch {
      contentEl.textContent = 'Verbindungsfehler. Bitte versuche es erneut.';
    }

    // Store assistant message with chatId
    const assistantMsg = { role: 'assistant', content: fullText };
    if (chatId) assistantMsg.chatId = chatId;
    messages.push(assistantMsg);
    history.push({ role: 'assistant', content: fullText });

    // Trim to max messages
    if (messages.length > MAX_MESSAGES) messages = messages.slice(-MAX_MESSAGES);
    if (history.length > MAX_MESSAGES) history = history.slice(-MAX_MESSAGES);

    saveToStorage();

    // Add rating row if we have a chatId
    if (chatId && fullText) {
      const msgBody = contentEl.closest('.message-body');
      addRatingRow(msgBody, chatId);
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    textarea.focus();
  }
</script>
</body>
</html>
